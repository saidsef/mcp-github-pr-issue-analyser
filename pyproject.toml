[project]
name = "mcp-github-pr-issue-analyser"
dynamic = ["version"]
description = "MCP GitHub Issues Create/Update and PR Analyse"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "saidsef" }
]
dependencies = [
    "fastmcp[apps]==3.2.0",
    "requests==2.33.0",
    "uv==0.10.10",
]

[project.scripts]
mcp-github-pr-issue-analyser = "mcp_github.issues_pr_analyser:main"

[project.urls]
homepage = "https://github.com/saidsef/mcp-github-pr-issue-analyser"
issues = "https://github.com/saidsef/mcp-github-pr-issue-analyser/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools_scm]
version_scheme = "guess-next-dev"
local_scheme = "no-local-version"
version_file = "src/mcp_github/_version.py"
fallback_version = "0.0.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true

[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "ruff>=0.15.3",
]
